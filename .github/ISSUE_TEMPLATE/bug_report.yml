name: Bug report
description: Report a reproducible problem in BegireX.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Do not include credentials, cookies, private URLs, or personal data. Security issues belong in a private report."
  - type: textarea
    id: summary
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. ...\n2. ...\n3. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: BegireX version
      placeholder: "v0.1.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: [Linux, macOS, Windows, Other]
    validations:
      required: true
